[tox]
skipsdist = true
envlist = py310, py311, py312, py313, py314

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314

[testenv]
passenv = PYTHON_VERSION
allowlist_externals = uv
commands =
    uv sync --python {envpython}
    uv run python -m pytest tests --cov --cov-config=pyproject.toml --cov-report=xml
    uv run ty check

[testenv:benchmark]
description = Run performance benchmarks with pytest-benchmark
passenv = PYTHON_VERSION
allowlist_externals = uv
commands =
    uv sync --python {envpython}
    uv run python -m pytest -c pytest.benchmark.ini \
        --benchmark-only \
        --benchmark-autosave \
        --benchmark-json={toxinidir}/benchmark_results.json \
        {posargs}
